<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PX 1602</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      overflow-y: auto;
      padding-bottom: 75px;
    }

    .header {
      background: #c8102e;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
    }

    .board {
      display: grid;
      grid-template-columns: 0.9fr 1fr 1.4fr;
      gap: 8px;
      padding: 8px;
      align-items: start;
    }

    .column {
      background: #1b1b1b;
      border-radius: 8px;
      padding: 6px;
      min-height: 75vh;
    }

    .title {
      text-align: center;
      font-weight: bold;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .available-title { background: #1f7a1f; font-size: 13px; }
    .low-title { background: #d96b00; font-size: 15px; }
    .waiting-title { background: #b00000; font-size: 21px; }
    .progress-title { background: #444; font-size: 15px; margin-top: 12px; }

    .card {
      position: relative;
      border-radius: 7px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      padding-right: 28px;
      word-break: break-word;
    }

    .available-card {
      background: #1f7a1f;
      padding: 6px 28px 6px 6px;
      font-size: 12px;
    }

    .low-card {
      background: #d96b00;
      border-left: 5px solid #ffb347;
      padding: 9px 28px 9px 9px;
      font-size: 15px;
      font-weight: bold;
    }

    .waiting-card {
      background: #b00000;
      border: 2px solid #ff7777;
      padding: 14px 28px 14px 10px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    .progress-card {
      background: #444;
      border: 2px solid #aaa;
      padding: 12px 28px 12px 10px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .delete-btn {
      position: absolute;
      top: 3px;
      right: 5px;
      background: transparent;
      color: white;
      border: none;
      font-size: 18px;
      font-weight: bold;
    }

    @keyframes pulse {
      0% { background: #b00000; }
      50% { background: #ff2b2b; }
      100% { background: #b00000; }
    }

    .flash {
      animation: pulse 0.6s ease-in-out 3;
    }

    #addBar {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      background: #111;
      padding: 6px;
      border-radius: 8px;
      z-index: 999;
    }

    #newItem {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
    }

    #addBtn {
      width: 60px;
      background: #1f7a1f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 26px;
      font-weight: bold;
    }

    .hint {
      text-align: center;
      opacity: 0.6;
      font-size: 11px;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="header">PX 1602</div>

  <div class="board">
    <div class="column">
      <div class="title available-title">AVAILABLE</div>
      <div id="available"></div>
    </div>

    <div class="column">
      <div class="title low-title">LOW</div>
      <div id="low"></div>
    </div>

    <div class="column">
      <div class="title waiting-title">WAITING</div>
      <div id="waiting"></div>

      <div class="title progress-title">IN PROGRESS</div>
      <div id="inprogress"></div>
    </div>
  </div>

  <div class="hint">Tap: Available → Low → Waiting → In Progress → Available</div>

  <div id="addBar">
    <input id="newItem" placeholder="Add item..." />
    <button id="addBtn">+</button>
  </div>

  <script>
    const SUPABASE_URL = "https://bmxijuzdebfylbpojlft.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Dsuoz_F97uw8TNzTxxKbwA_efOkHdPG";

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const available = document.getElementById("available");
    const low = document.getElementById("low");
    const waiting = document.getElementById("waiting");
    const inprogress = document.getElementById("inprogress");
    const newItem = document.getElementById("newItem");
    const addBtn = document.getElementById("addBtn");

    let previousWaiting = new Set();

    function playSound() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();

        osc.type = "square";
        osc.frequency.value = 880;
        gain.gain.value = 0.15;

        osc.connect(gain);
        gain.connect(audio.destination);

        osc.start();
        osc.stop(audio.currentTime + 0.25);
      } catch {}
    }

    async function loadItems() {
      const { data, error } = await db
        .from("kitchen_items")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) {
        alert("Load error: " + error.message);
        return;
      }

      available.innerHTML = "";
      low.innerHTML = "";
      waiting.innerHTML = "";
      inprogress.innerHTML = "";

      data.forEach(item => {
        const card = createCard(item);

        if (item.status === "available") available.appendChild(card);
        if (item.status === "low") low.appendChild(card);

        if (item.status === "waiting") {
          waiting.appendChild(card);

          if (!previousWaiting.has(item.id)) {
            card.classList.add("flash");
            playSound();
            setTimeout(() => card.classList.remove("flash"), 1800);
          }
        }

        if (item.status === "inprogress") inprogress.appendChild(card);
      });

      previousWaiting = new Set(
        data.filter(item => item.status === "waiting").map(item => item.id)
      );
    }

    function createCard(item) {
      const card = document.createElement("div");
      card.className = "card";

      if (item.status === "available") card.classList.add("available-card");
      if (item.status === "low") card.classList.add("low-card");
      if (item.status === "waiting") card.classList.add("waiting-card");
      if (item.status === "inprogress") card.classList.add("progress-card");

      card.innerHTML = `
        <div>${item.name}</div>
        <button class="delete-btn">×</button>
      `;

      card.addEventListener("click", () => moveNext(item));

      card.querySelector(".delete-btn").addEventListener("click", async (e) => {
        e.stopPropagation();

        const { error } = await db
          .from("kitchen_items")
          .delete()
          .eq("id", item.id);

        if (error) alert("Delete error: " + error.message);
      });

      return card;
    }

    async function moveNext(item) {
      let nextStatus = "available";

      if (item.status === "available") nextStatus = "low";
      else if (item.status === "low") nextStatus = "waiting";
      else if (item.status === "waiting") nextStatus = "inprogress";
      else if (item.status === "inprogress") nextStatus = "available";

      const { error } = await db
        .from("kitchen_items")
        .update({ status: nextStatus })
        .eq("id", item.id);

      if (error) alert("Move error: " + error.message);
    }

    async function addItem() {
      const name = newItem.value.trim();
      if (!name) return;

      const { error } = await db
        .from("kitchen_items")
        .insert([{ name: name, status: "available" }]);

      if (error) {
        alert("Add error: " + error.message);
        return;
      }

      newItem.value = "";
    }

    addBtn.addEventListener("click", addItem);

    newItem.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addItem();
    });

    db.channel("shared-kitchen-board")
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "kitchen_items" },
        loadItems
      )
      .subscribe();

    loadItems();
  </script>
</body>
</html>
