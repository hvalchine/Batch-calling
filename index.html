<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PX 1602 Kitchen Board</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow-y: auto;
      touch-action: pan-y;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .app {
      min-height: 100vh;
      padding: 8px;
      padding-bottom: 75px;
    }

    .header {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      padding: 8px;
      background: #c8102e;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .board {
      display: grid;
      grid-template-columns: 0.9fr 1fr 1.4fr;
      gap: 8px;
      align-items: start;
    }

    .column {
      background: #1b1b1b;
      border-radius: 8px;
      padding: 6px;
      min-height: 75vh;
    }

    .column-title, .section-title {
      text-align: center;
      font-weight: bold;
      padding: 8px 4px;
      margin-bottom: 6px;
      border-radius: 6px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .available .column-title {
      background: #1f7a1f;
      font-size: 13px;
    }

    .low .column-title {
      background: #d96b00;
      font-size: 15px;
    }

    .waiting .column-title {
      background: #b00000;
      font-size: 20px;
    }

    .section-title {
      position: static;
      margin-top: 12px;
      background: #333;
      font-size: 15px;
    }

    .card {
      position: relative;
      border-radius: 7px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s ease;
      padding-right: 26px;
    }

    .card:active { transform: scale(0.97); }

    .delete-btn {
      position: absolute;
      top: 3px;
      right: 5px;
      background: transparent;
      border: none;
      color: white;
      font-size: 17px;
      font-weight: bold;
      opacity: 0.65;
      cursor: pointer;
    }

    .available .card {
      background: #1f7a1f;
      padding: 6px 26px 6px 6px;
      font-size: 12px;
      line-height: 1.1;
    }

    .low .card {
      background: #d96b00;
      border-left: 5px solid #ffb347;
      padding: 9px 26px 9px 9px;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.15;
      animation: none !important;
    }

    .waiting .card {
      background: #b00000;
      border: 2px solid #ff7777;
      padding: 14px 26px 14px 10px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      line-height: 1.15;
    }

    .inprogress-card {
      background: #444 !important;
      border: 2px solid #aaa !important;
      font-size: 18px !important;
    }

    .timer {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.85;
    }

    .waiting .timer {
      font-size: 15px;
      color: #ffe0e0;
    }

    .low .timer {
      color: #fff1d6;
    }

    @keyframes waitingPulse {
      0% { background: #b00000; }
      50% { background: #ff2b2b; }
      100% { background: #b00000; }
    }

    .waiting .flash {
      animation: waitingPulse 0.6s ease-in-out 3;
    }

    #addBar {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 1000;
      background: #111;
      padding: 6px;
      border-radius: 8px;
    }

    #newItem {
      flex: 1;
      padding: 11px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    #addBtn {
      width: 58px;
      background: #1f7a1f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 24px;
      font-weight: bold;
    }

    .hint {
      text-align: center;
      font-size: 11px;
      opacity: 0.6;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">PX 1602</div>

    <div class="board">
      <div class="column available" id="available">
        <div class="column-title">AVAILABLE</div>
      </div>

      <div class="column low" id="low">
        <div class="column-title">LOW</div>
      </div>

      <div class="column waiting" id="waitingColumn">
        <div class="column-title">WAITING</div>
        <div id="waiting"></div>

        <div class="section-title">IN PROGRESS</div>
        <div id="inprogress"></div>
      </div>
    </div>

    <div class="hint">
      Tap flow: Available → Low → Waiting → In Progress → Available
    </div>
  </div>

  <div id="addBar">
    <input id="newItem" placeholder="Add item..." />
    <button id="addBtn">+</button>
  </div>

  <script>
    const items = [
      "Orange Chicken",
      "Teriyaki Chicken",
      "Honey Walnut Shrimp",
      "Broccoli Beef",
      "Beijing Beef",
      "Kung Pao Chicken",
      "Mushroom Chicken",
      "String Bean Chicken",
      "Black Pepper Chicken",
      "SweetFire Chicken",
      "Super Greens",
      "Chow Mein",
      "Fried Rice",
      "White Rice",
      "Brown Rice",
      "Egg Rolls",
      "Rangoons",
      "Spring Rolls"
    ];

    const available = document.getElementById("available");
    const low = document.getElementById("low");
    const waiting = document.getElementById("waiting");
    const inprogress = document.getElementById("inprogress");
    const addBtn = document.getElementById("addBtn");
    const newItem = document.getElementById("newItem");

    const timers = {};

    function playWaitingSound() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.25);
    }

    function createCard(name) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.name = name;
      card.dataset.status = "available";

      card.innerHTML = `
        <div>${name}</div>
        <span class="timer"></span>
        <button class="delete-btn">×</button>
      `;

      card.addEventListener("click", () => cycleStatus(card));

      card.querySelector(".delete-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        clearInterval(timers[name]);
        card.remove();
      });

      return card;
    }

    function cycleStatus(card) {
      const status = card.dataset.status;

      if (status === "available") {
        moveCard(card, "low");
      } else if (status === "low") {
        moveCard(card, "waiting");
      } else if (status === "waiting") {
        moveCard(card, "inprogress");
      } else {
        moveCard(card, "available");
      }
    }

    function moveCard(card, newStatus) {
      const name = card.dataset.name;
      card.dataset.status = newStatus;

      clearInterval(timers[name]);
      card.querySelector(".timer").textContent = "";
      card.classList.remove("flash", "inprogress-card");

      if (newStatus === "available") {
        available.appendChild(card);
      }

      if (newStatus === "low") {
        low.appendChild(card);
        startTimer(card);
      }

      if (newStatus === "waiting") {
        waiting.appendChild(card);

        card.classList.add("flash");
        playWaitingSound();

        setTimeout(() => {
          card.classList.remove("flash");
        }, 1800);

        startTimer(card);
      }

      if (newStatus === "inprogress") {
        card.classList.add("inprogress-card");
        inprogress.appendChild(card);
        startTimer(card);
      }
    }

    function startTimer(card) {
      const name = card.dataset.name;
      const timerText = card.querySelector(".timer");
      let seconds = 0;

      timers[name] = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        timerText.textContent = mins + ":" + secs.toString().padStart(2, "0");
      }, 1000);
    }

    function addItem() {
      const name = newItem.value.trim();
      if (!name) return;

      available.appendChild(createCard(name));
      newItem.value = "";
      newItem.focus();
    }

    addBtn.addEventListener("click", addItem);

    newItem.addEventListener("keypress", (e) => {
      if (e.key === "Enter") addItem();
    });

    items.forEach(item => {
      available.appendChild(createCard(item));
    });
  </script>
</body>
</html>
