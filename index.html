<!DOCTYPE html>
<html>
<head>
  <title>PX 1602</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background:#f3f4f6; margin:0; padding:8px; }
    .app { max-width:1100px; margin:auto; }
    h1 { text-align:center; font-size:22px; margin:8px 0 12px; }
    .input-box { background:white; padding:8px; border-radius:12px; display:flex; gap:6px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    input, select, button { padding:8px; border-radius:8px; border:1px solid #ccc; font-size:13px; }
    input { flex:1; }
    button { background:#111827; color:white; border:none; cursor:pointer; }
    .columns { display:grid; grid-template-columns: repeat(3, 1fr); gap:6px; }
    .column { background:white; border-radius:14px; padding:6px; min-height:420px; max-height:75vh; overflow-y:auto; box-shadow:0 1px 5px rgba(0,0,0,.08); }
    .column h2 { font-size:14px; margin:0 0 6px; padding:7px; border-radius:10px; color:white; text-align:center; }
    .sub-title { font-size:12px; margin:8px 4px 4px; color:#374151; font-weight:bold; }
    .waiting-title { background:#dc2626; }
    .low-title { background:#f59e0b; }
    .available-title { background:#16a34a; }
    .task-list { min-height:140px; padding-bottom:18px; }
    .task { padding:8px; margin:6px 0; border-radius:10px; color:white; font-size:13px; font-weight:bold; cursor:grab; touch-action:none; }
    .task-top { display:flex; justify-content:space-between; align-items:center; gap:6px; }
    .timer { font-size:11px; margin-top:4px; opacity:.95; font-weight:normal; }
    .waiting { background:#ef4444; }
    .inprogress { background:#3b82f6; }
    .low { background:#f59e0b; }
    .available { background:#22c55e; }
    .delete { background:rgba(0,0,0,.25); color:white; border:none; border-radius:6px; padding:4px 7px; font-size:11px; width:auto; }
    .ghost { opacity:0.4; }
    .alert { animation: flash 1s infinite; outline:3px solid yellow; }
    @keyframes flash { 0% { filter: brightness(1); } 50% { filter: brightness(1.45); } 100% { filter: brightness(1); } }

    @media (max-width:700px) {
      body { padding:5px; }
      h1 { font-size:19px; }
      .columns { grid-template-columns: repeat(3, 1fr); gap:5px; }
      .column { padding:5px; min-height:480px; }
      .column h2 { font-size:12px; padding:6px; }
      .task { font-size:11px; padding:6px; }
      .timer { font-size:10px; }
      input, select, button { font-size:12px; padding:7px; }
    }
  </style>
</head>

<body>
<div class="app">
  <h1>PX 1602</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Item name">
    <select id="category">
      <option value="waiting">Waiting</option>
      <option value="inprogress">In Progress</option>
      <option value="low">Low</option>
      <option value="available">Available</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <div class="columns">
    <div class="column">
      <h2 class="waiting-title">Waiting</h2>
      <div class="sub-title">Waiting</div>
      <div id="waitingList" class="task-list" data-category="waiting"></div>
      <div class="sub-title">In Progress</div>
      <div id="inProgressList" class="task-list" data-category="inprogress"></div>
    </div>

    <div class="column">
      <h2 class="low-title">Low</h2>
      <div id="lowList" class="task-list" data-category="low"></div>
    </div>

    <div class="column">
      <h2 class="available-title">Available</h2>
      <div id="availableList" class="task-list" data-category="available"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const SUPABASE_URL = "https://bmxijuzdebfylbpojlft.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_Dsuoz_F97uw8TNzTxxKbwA_efOkHdPG";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const taskInput = document.getElementById("taskInput");
  const category = document.getElementById("category");
  const addBtn = document.getElementById("addBtn");

  const waitingList = document.getElementById("waitingList");
  const inProgressList = document.getElementById("inProgressList");
  const lowList = document.getElementById("lowList");
  const availableList = document.getElementById("availableList");

  const alertLimits = {
    waiting: 5,
    inprogress: 8,
    low: 10,
    available: 999999
  };

  addBtn.addEventListener("click", addTask);
  taskInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") addTask();
  });

  function playAlertSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq, delay) {
      setTimeout(() => {
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        oscillator.type = "square";
        oscillator.frequency.value = freq;

        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.35);
      }, delay);
    }

    beep(900, 0);
    beep(1200, 350);
    beep(900, 700);
  }

  async function addTask() {
    const text = taskInput.value.trim();
    const selectedCategory = category.value;
    if (!text) return;

    const { error } = await supabase
      .from("tasks")
      .insert([{ text, category: selectedCategory, status_started_at: new Date().toISOString() }]);

    if (error) {
      alert("Could not add item.");
      console.error(error);
      return;
    }

    if (selectedCategory === "waiting" || selectedCategory === "low") {
      playAlertSound();
    }

    taskInput.value = "";
    loadTasks();
  }

  async function deleteTask(id) {
    const { error } = await supabase.from("tasks").delete().eq("id", id);
    if (error) {
      alert("Could not delete item.");
      console.error(error);
      return;
    }
    loadTasks();
  }

  async function updateTaskCategory(id, newCategory) {
    const { error } = await supabase
      .from("tasks")
      .update({ category: newCategory, status_started_at: new Date().toISOString() })
      .eq("id", id);

    if (error) {
      alert("Could not move item. Check Supabase update policy.");
      console.error(error);
      loadTasks();
      return;
    }
  }

  function minutesSince(dateString) {
    if (!dateString) return 0;
    return Math.floor((new Date() - new Date(dateString)) / 60000);
  }

  function timerText(minutes) {
    if (minutes < 1) return "Timer: now";
    if (minutes === 1) return "Timer: 1 min";
    return "Timer: " + minutes + " min";
  }

  function shouldFlash(task) {
    return minutesSince(task.status_started_at) >= alertLimits[task.category];
  }

  async function loadTasks() {
    const { data, error } = await supabase
      .from("tasks")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      alert("Could not load items.");
      console.error(error);
      return;
    }

    waitingList.innerHTML = "";
    inProgressList.innerHTML = "";
    lowList.innerHTML = "";
    availableList.innerHTML = "";

    data.forEach(task => {
      const mins = minutesSince(task.status_started_at);

      const taskDiv = document.createElement("div");
      taskDiv.className = `task ${task.category}`;
      taskDiv.dataset.id = task.id;

      if (shouldFlash(task)) taskDiv.classList.add("alert");

      const top = document.createElement("div");
      top.className = "task-top";

      const span = document.createElement("span");
      span.textContent = task.text;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "X";
      deleteBtn.className = "delete";
      deleteBtn.onclick = (event) => {
        event.stopPropagation();
        deleteTask(task.id);
      };

      top.appendChild(span);
      top.appendChild(deleteBtn);

      const timer = document.createElement("div");
      timer.className = "timer";
      timer.textContent = timerText(mins);

      taskDiv.appendChild(top);
      taskDiv.appendChild(timer);

      if (task.category === "waiting") waitingList.appendChild(taskDiv);
      else if (task.category === "inprogress") inProgressList.appendChild(taskDiv);
      else if (task.category === "low") lowList.appendChild(taskDiv);
      else if (task.category === "available") availableList.appendChild(taskDiv);
    });
  }

  function setupDragDrop() {
    [waitingList, inProgressList, lowList, availableList].forEach(list => {
      new Sortable(list, {
        group: "panda-ops",
        animation: 150,
        ghostClass: "ghost",
        forceFallback: true,
        fallbackOnBody: true,
        delay: 150,
        delayOnTouchOnly: true,
        touchStartThreshold: 5,

        onAdd: async function(event) {
          const taskId = event.item.dataset.id;
          const newCategory = event.to.dataset.category;

          event.item.className = `task ${newCategory}`;

          if (newCategory === "waiting" || newCategory === "low") {
            playAlertSound();
          }

          await updateTaskCategory(taskId, newCategory);
          loadTasks();
        }
      });
    });
  }

  supabase
    .channel("tasks-live-updates")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "tasks" },
      () => loadTasks()
    )
    .subscribe();

  setupDragDrop();
  loadTasks();
  setInterval(loadTasks, 30000);
</script>

</body>
</html>
