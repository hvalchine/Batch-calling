<!DOCTYPE html>
<html>
<head>
  <title>Shared Task Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; padding:15px; }
    h1 { text-align:center; }
    .app { max-width:1000px; margin:auto; }
    .input-box, .column { background:white; padding:15px; border-radius:10px; }
    .input-box { margin-bottom:20px; display:flex; gap:8px; flex-wrap:wrap; }
    input, select, button { padding:10px; border-radius:6px; border:1px solid #ccc; }
    button { cursor:pointer; background:#222; color:white; }
    .columns { display:flex; gap:15px; }
    .column { flex:1; min-height:250px; }
    .task {
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      color:white;
    }
    .task-top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }
    .task-buttons {
      margin-top:10px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }
    .task-buttons button, .delete {
      background:rgba(0,0,0,.25);
      border:none;
      color:white;
      font-size:12px;
      padding:6px 8px;
    }
    .waiting { background:#ef4444; }
    .low { background:#f59e0b; }
    .available { background:#22c55e; }

    @media (max-width:700px) {
      .columns { flex-direction:column; }
      .input-box { flex-direction:column; }
      input, select, button { width:100%; }
    }
  </style>
</head>

<body>

<div class="app">
  <h1>Shared Task Board</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter a task">

    <select id="category">
      <option value="waiting">Waiting</option>
      <option value="low">Low</option>
      <option value="available">Available</option>
    </select>

    <button id="addBtn">Add Task</button>
  </div>

  <div class="columns">
    <div class="column">
      <h2>Waiting</h2>
      <div id="waitingList"></div>
    </div>

    <div class="column">
      <h2>Low</h2>
      <div id="lowList"></div>
    </div>

    <div class="column">
      <h2>Available</h2>
      <div id="availableList"></div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const SUPABASE_URL = "https://bmxijuzdebfylbpojlft.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_Dsuoz_F97uw8TNzTxxKbwA_efOkHdPG";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const taskInput = document.getElementById("taskInput");
  const category = document.getElementById("category");
  const addBtn = document.getElementById("addBtn");

  const waitingList = document.getElementById("waitingList");
  const lowList = document.getElementById("lowList");
  const availableList = document.getElementById("availableList");

  addBtn.addEventListener("click", addTask);

  taskInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") addTask();
  });

  async function addTask() {
    const text = taskInput.value.trim();
    const selectedCategory = category.value;

    if (!text) return;

    const { error } = await supabase
      .from("tasks")
      .insert([{ text: text, category: selectedCategory }]);

    if (error) {
      alert("Could not add task.");
      console.error(error);
      return;
    }

    taskInput.value = "";
    loadTasks();
  }

  async function deleteTask(id) {
    const { error } = await supabase
      .from("tasks")
      .delete()
      .eq("id", id);

    if (error) {
      alert("Could not delete task.");
      console.error(error);
      return;
    }

    loadTasks();
  }

  async function moveTask(id, newCategory) {
    const { error } = await supabase
      .from("tasks")
      .update({ category: newCategory })
      .eq("id", id);

    if (error) {
      alert("Could not move task. Add the update policy in Supabase.");
      console.error(error);
      return;
    }

    loadTasks();
  }

  async function loadTasks() {
    const { data, error } = await supabase
      .from("tasks")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      alert("Could not load tasks.");
      console.error(error);
      return;
    }

    waitingList.innerHTML = "";
    lowList.innerHTML = "";
    availableList.innerHTML = "";

    data.forEach(task => {
      const taskDiv = document.createElement("div");
      taskDiv.className = `task ${task.category}`;

      const top = document.createElement("div");
      top.className = "task-top";

      const span = document.createElement("span");
      span.textContent = task.text;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "X";
      deleteBtn.className = "delete";
      deleteBtn.onclick = () => deleteTask(task.id);

      top.appendChild(span);
      top.appendChild(deleteBtn);

      const buttons = document.createElement("div");
      buttons.className = "task-buttons";

      const waitingBtn = document.createElement("button");
      waitingBtn.textContent = "Waiting";
      waitingBtn.onclick = () => moveTask(task.id, "waiting");

      const lowBtn = document.createElement("button");
      lowBtn.textContent = "Low";
      lowBtn.onclick = () => moveTask(task.id, "low");

      const availableBtn = document.createElement("button");
      availableBtn.textContent = "Available";
      availableBtn.onclick = () => moveTask(task.id, "available");

      buttons.appendChild(waitingBtn);
      buttons.appendChild(lowBtn);
      buttons.appendChild(availableBtn);

      taskDiv.appendChild(top);
      taskDiv.appendChild(buttons);

      if (task.category === "waiting") {
        waitingList.appendChild(taskDiv);
      } else if (task.category === "low") {
        lowList.appendChild(taskDiv);
      } else if (task.category === "available") {
        availableList.appendChild(taskDiv);
      }
    });
  }

  supabase
    .channel("tasks-live-updates")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "tasks" },
      () => loadTasks()
    )
    .subscribe();

  loadTasks();
</script>

</body>
</html>
