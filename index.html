<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PX 1602 Kitchen Board</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: auto;
      min-height: 100%;
      overflow-y: auto;
      touch-action: pan-y;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .app {
      min-height: 100vh;
      padding: 8px;
      overflow-y: auto;
    }

    .header {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      padding: 8px;
      background: #c8102e;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .board {
      display: grid;
      grid-template-columns: 0.85fr 1.4fr 1fr;
      gap: 8px;
      align-items: start;
      min-height: 100vh;
      overflow-y: visible;
    }

    .column {
      background: #1b1b1b;
      border-radius: 8px;
      padding: 6px;
      min-height: 70vh;
      max-height: none;
      overflow-y: visible;
    }

    .column-title {
      text-align: center;
      font-weight: bold;
      padding: 8px 4px;
      margin-bottom: 6px;
      border-radius: 6px;
      background: #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .available .column-title {
      font-size: 13px;
    }

    .waiting .column-title {
      font-size: 20px;
      background: #7a4b00;
    }

    .low .column-title {
      font-size: 15px;
      background: #5a1f1f;
    }

    .card {
      border-radius: 7px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s ease, background 0.2s ease;
    }

    .card:active {
      transform: scale(0.97);
    }

    .available .card {
      background: #263826;
      padding: 6px;
      font-size: 12px;
      line-height: 1.1;
      opacity: 0.9;
    }

    .waiting .card {
      background: #3a2a00;
      border: 2px solid #ffcc33;
      padding: 14px 10px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      line-height: 1.15;
    }

    .low .card {
      background: #3a1f1f;
      border-left: 5px solid #ff3333;
      padding: 9px;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.15;
      animation: none !important;
    }

    .timer {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      opacity: 0.85;
    }

    .waiting .timer {
      font-size: 15px;
      color: #ffd966;
    }

    .low .timer {
      color: #ffaaaa;
    }

    @keyframes waitingPulse {
      0% { background: #3a2a00; }
      50% { background: #8a5a00; }
      100% { background: #3a2a00; }
    }

    .waiting .flash {
      animation: waitingPulse 0.6s ease-in-out 3;
    }

    .hint {
      text-align: center;
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">PX 1602</div>

    <div class="board">
      <div class="column available" id="available">
        <div class="column-title">AVAILABLE</div>
      </div>

      <div class="column waiting" id="waiting">
        <div class="column-title">WAITING</div>
      </div>

      <div class="column low" id="low">
        <div class="column-title">LOW / NEEDED</div>
      </div>
    </div>

    <div class="hint">Tap item to move: Available → Waiting → Low → Available</div>
  </div>

  <script>
    const items = [
      "Orange Chicken",
      "Teriyaki Chicken",
      "Honey Walnut Shrimp",
      "Broccoli Beef",
      "Beijing Beef",
      "Kung Pao Chicken",
      "Mushroom Chicken",
      "String Bean Chicken",
      "Black Pepper Chicken",
      "Super Greens",
      "Chow Mein",
      "Fried Rice",
      "White Rice",
      "Brown Rice",
      "Egg Rolls",
      "Rangoons"
    ];

    const available = document.getElementById("available");
    const waiting = document.getElementById("waiting");
    const low = document.getElementById("low");

    const timers = {};

    function playWaitingSound() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);

      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.25);
    }

    function createCard(name) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.name = name;
      card.dataset.status = "available";

      card.innerHTML = `
        <div>${name}</div>
        <span class="timer"></span>
      `;

      card.addEventListener("click", () => cycleStatus(card));

      return card;
    }

    function cycleStatus(card) {
      const status = card.dataset.status;

      if (status === "available") {
        moveCard(card, "waiting");
      } else if (status === "waiting") {
        moveCard(card, "low");
      } else {
        moveCard(card, "available");
      }
    }

    function moveCard(card, newStatus) {
      const name = card.dataset.name;
      card.dataset.status = newStatus;

      clearInterval(timers[name]);
      card.querySelector(".timer").textContent = "";

      if (newStatus === "available") {
        available.appendChild(card);
      }

      if (newStatus === "waiting") {
        waiting.appendChild(card);

        card.classList.add("flash");
        playWaitingSound();

        setTimeout(() => {
          card.classList.remove("flash");
        }, 1800);

        startTimer(card);
      }

      if (newStatus === "low") {
        low.appendChild(card);
        startTimer(card);
      }
    }

    function startTimer(card) {
      const name = card.dataset.name;
      const timerText = card.querySelector(".timer");

      let seconds = 0;

      timers[name] = setInterval(() => {
        seconds++;

        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;

        timerText.textContent =
          mins + ":" + secs.toString().padStart(2, "0");
      }, 1000);
    }

    items.forEach(item => {
      available.appendChild(createCard(item));
    });
  </script>
</body>
</html>
