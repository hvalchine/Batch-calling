<!DOCTYPE html>
<html>
<head>
  <title>Panda Ops Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background:#f3f4f6;
      margin:0;
      padding:10px;
    }

    .app {
      max-width:1100px;
      margin:auto;
    }

    h1 {
      text-align:center;
      font-size:24px;
      margin:10px 0 14px;
    }

    .input-box {
      background:white;
      padding:10px;
      border-radius:12px;
      display:flex;
      gap:6px;
      margin-bottom:10px;
      box-shadow:0 1px 4px rgba(0,0,0,.08);
    }

    input, select, button {
      padding:8px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
    }

    input { flex:1; }

    button {
      background:#111827;
      color:white;
      border:none;
      cursor:pointer;
    }

    .columns {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:8px;
    }

    .column {
      background:white;
      border-radius:14px;
      padding:8px;
      min-height:420px;
      max-height:70vh;
      overflow-y:auto;
      box-shadow:0 1px 5px rgba(0,0,0,.08);
    }

    .column h2 {
      font-size:16px;
      margin:0 0 8px;
      padding:8px;
      border-radius:10px;
      color:white;
      text-align:center;
    }

    .waiting-title { background:#dc2626; }
    .low-title { background:#f59e0b; }
    .available-title { background:#16a34a; }

    .task {
      padding:8px;
      margin:6px 0;
      border-radius:10px;
      color:white;
      font-size:14px;
      font-weight:bold;
    }

    .task-top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:6px;
    }

    .task-buttons {
      display:flex;
      gap:4px;
      margin-top:6px;
    }

    .task-buttons button,
    .delete {
      font-size:11px;
      padding:5px;
      border-radius:6px;
      background:rgba(0,0,0,.25);
      color:white;
      border:none;
      flex:1;
    }

    .waiting { background:#ef4444; }
    .low { background:#f59e0b; }
    .available { background:#22c55e; }

    @media (max-width:700px) {
      body { padding:6px; }
      h1 { font-size:20px; }
      .columns { grid-template-columns: repeat(3, 1fr); gap:5px; }
      .column { padding:5px; min-height:500px; }
      .column h2 { font-size:13px; padding:6px; }
      .task { font-size:12px; padding:6px; }
      .task-buttons button,
      .delete { font-size:10px; padding:4px; }
      input, select, button { font-size:12px; padding:7px; }
    }
  </style>
</head>

<body>

<div class="app">
  <h1>Panda Ops Board</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Item name">
    <select id="category">
      <option value="waiting">Waiting</option>
      <option value="low">Low</option>
      <option value="available">Available</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <div class="columns">
    <div class="column">
      <h2 class="waiting-title">Waiting</h2>
      <div id="waitingList"></div>
    </div>

    <div class="column">
      <h2 class="low-title">Low</h2>
      <div id="lowList"></div>
    </div>

    <div class="column">
      <h2 class="available-title">Available</h2>
      <div id="availableList"></div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const SUPABASE_URL = "https://bmxijuzdebfylbpojlft.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_Dsuoz_F97uw8TNzTxxKbwA_efOkHdPG";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const taskInput = document.getElementById("taskInput");
  const category = document.getElementById("category");
  const addBtn = document.getElementById("addBtn");

  const waitingList = document.getElementById("waitingList");
  const lowList = document.getElementById("lowList");
  const availableList = document.getElementById("availableList");

  addBtn.addEventListener("click", addTask);

  taskInput.addEventListener("keydown", function(event) {
    if (event.key === "Enter") addTask();
  });

  async function addTask() {
    const text = taskInput.value.trim();
    const selectedCategory = category.value;
    if (!text) return;

    await supabase
      .from("tasks")
      .insert([{ text: text, category: selectedCategory }]);

    taskInput.value = "";
    loadTasks();
  }

  async function deleteTask(id) {
    await supabase.from("tasks").delete().eq("id", id);
    loadTasks();
  }

  async function moveTask(id, newCategory) {
    await supabase
      .from("tasks")
      .update({ category: newCategory })
      .eq("id", id);

    loadTasks();
  }

  async function loadTasks() {
    const { data, error } = await supabase
      .from("tasks")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      console.error(error);
      return;
    }

    waitingList.innerHTML = "";
    lowList.innerHTML = "";
    availableList.innerHTML = "";

    data.forEach(task => {
      const taskDiv = document.createElement("div");
      taskDiv.className = `task ${task.category}`;

      const top = document.createElement("div");
      top.className = "task-top";

      const span = document.createElement("span");
      span.textContent = task.text;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "X";
      deleteBtn.className = "delete";
      deleteBtn.onclick = () => deleteTask(task.id);

      top.appendChild(span);
      top.appendChild(deleteBtn);

      const buttons = document.createElement("div");
      buttons.className = "task-buttons";

      const waitingBtn = document.createElement("button");
      waitingBtn.textContent = "W";
      waitingBtn.onclick = () => moveTask(task.id, "waiting");

      const lowBtn = document.createElement("button");
      lowBtn.textContent = "L";
      lowBtn.onclick = () => moveTask(task.id, "low");

      const availableBtn = document.createElement("button");
      availableBtn.textContent = "A";
      availableBtn.onclick = () => moveTask(task.id, "available");

      buttons.appendChild(waitingBtn);
      buttons.appendChild(lowBtn);
      buttons.appendChild(availableBtn);

      taskDiv.appendChild(top);
      taskDiv.appendChild(buttons);

      if (task.category === "waiting") waitingList.appendChild(taskDiv);
      if (task.category === "low") lowList.appendChild(taskDiv);
      if (task.category === "available") availableList.appendChild(taskDiv);
    });
  }

  supabase
    .channel("tasks-live-updates")
    .on(
      "postgres_changes",
      { event: "*", schema: "public", table: "tasks" },
      () => loadTasks()
    )
    .subscribe();

  loadTasks();
</script>

</body>
</html>
