<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PX 1602 Kitchen Board</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow-y: auto;
      touch-action: pan-y;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .app {
      min-height: 100vh;
      padding: 8px;
      padding-bottom: 75px;
    }

    .header {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      padding: 8px;
      background: #c8102e;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .board {
      display: grid;
      grid-template-columns: 0.9fr 1fr 1.4fr;
      gap: 8px;
      align-items: start;
    }

    .column {
      background: #1b1b1b;
      border-radius: 8px;
      padding: 6px;
      min-height: 75vh;
    }

    .column-title, .section-title {
      text-align: center;
      font-weight: bold;
      padding: 8px 4px;
      margin-bottom: 6px;
      border-radius: 6px;
    }

    .available .column-title {
      background: #1f7a1f;
      font-size: 13px;
    }

    .low .column-title {
      background: #d96b00;
      font-size: 15px;
    }

    .waiting .column-title {
      background: #b00000;
      font-size: 20px;
    }

    .section-title {
      margin-top: 12px;
      background: #333;
      font-size: 15px;
    }

    .card {
      position: relative;
      border-radius: 7px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s ease;
      padding-right: 26px;
    }

    .card:active { transform: scale(0.97); }

    .delete-btn {
      position: absolute;
      top: 3px;
      right: 5px;
      background: transparent;
      border: none;
      color: white;
      font-size: 17px;
      font-weight: bold;
      opacity: 0.7;
      cursor: pointer;
    }

    .available .card {
      background: #1f7a1f;
      padding: 6px 26px 6px 6px;
      font-size: 12px;
      line-height: 1.1;
    }

    .low .card {
      background: #d96b00;
      border-left: 5px solid #ffb347;
      padding: 9px 26px 9px 9px;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.15;
      animation: none !important;
    }

    .waiting .card {
      background: #b00000;
      border: 2px solid #ff7777;
      padding: 14px 26px 14px 10px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      line-height: 1.15;
    }

    .inprogress-card {
      background: #444 !important;
      border: 2px solid #aaa !important;
      font-size: 18px !important;
    }

    @keyframes waitingPulse {
      0% { background: #b00000; }
      50% { background: #ff2b2b; }
      100% { background: #b00000; }
    }

    .waiting .flash {
      animation: waitingPulse 0.6s ease-in-out 3;
    }

    #addBar {
      position: fixed;
      bottom: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      gap: 6px;
      z-index: 1000;
      background: #111;
      padding: 6px;
      border-radius: 8px;
    }

    #newItem {
      flex: 1;
      padding: 11px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    #addBtn {
      width: 58px;
      background: #1f7a1f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 24px;
      font-weight: bold;
    }

    .hint {
      text-align: center;
      font-size: 11px;
      opacity: 0.6;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">PX 1602</div>

    <div class="board">
      <div class="column available">
        <div class="column-title">AVAILABLE</div>
        <div id="available"></div>
      </div>

      <div class="column low">
        <div class="column-title">LOW</div>
        <div id="low"></div>
      </div>

      <div class="column waiting">
        <div class="column-title">WAITING</div>
        <div id="waiting"></div>

        <div class="section-title">IN PROGRESS</div>
        <div id="inprogress"></div>
      </div>
    </div>

    <div class="hint">Tap flow: Available → Low → Waiting → In Progress → Available</div>
  </div>

  <div id="addBar">
    <input id="newItem" placeholder="Add item..." />
    <button id="addBtn">+</button>
  </div>

  <script>
    const SUPABASE_URL = "PASTE_YOUR_SUPABASE_URL_HERE";
    const SUPABASE_ANON_KEY = "PASTE_YOUR_SUPABASE_ANON_KEY_HERE";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const available = document.getElementById("available");
    const low = document.getElementById("low");
    const waiting = document.getElementById("waiting");
    const inprogress = document.getElementById("inprogress");
    const addBtn = document.getElementById("addBtn");
    const newItem = document.getElementById("newItem");

    let lastWaitingIds = new Set();

    function playWaitingSound() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.25);
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("kitchen_items")
        .select("*")
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      available.innerHTML = "";
      low.innerHTML = "";
      waiting.innerHTML = "";
      inprogress.innerHTML = "";

      data.forEach(item => {
        const card = createCard(item);

        if (item.status === "available") available.appendChild(card);
        if (item.status === "low") low.appendChild(card);

        if (item.status === "waiting") {
          waiting.appendChild(card);

          if (!lastWaitingIds.has(item.id)) {
            card.classList.add("flash");
            playWaitingSound();

            setTimeout(() => {
              card.classList.remove("flash");
            }, 1800);
          }
        }

        if (item.status === "inprogress") {
          card.classList.add("inprogress-card");
          inprogress.appendChild(card);
        }
      });

      lastWaitingIds = new Set(
        data.filter(item => item.status === "waiting").map(item => item.id)
      );
    }

    function createCard(item) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = item.id;
      card.dataset.status = item.status;

      card.innerHTML = `
        <div>${item.name}</div>
        <button class="delete-btn">×</button>
      `;

      card.addEventListener("click", () => cycleStatus(item));

      card.querySelector(".delete-btn").addEventListener("click", async (e) => {
        e.stopPropagation();

        await supabaseClient
          .from("kitchen_items")
          .delete()
          .eq("id", item.id);

        loadItems();
      });

      return card;
    }

    async function cycleStatus(item) {
      let newStatus;

      if (item.status === "available") {
        newStatus = "low";
      } else if (item.status === "low") {
        newStatus = "waiting";
      } else if (item.status === "waiting") {
        newStatus = "inprogress";
      } else {
        newStatus = "available";
      }

      await supabaseClient
        .from("kitchen_items")
        .update({ status: newStatus })
        .eq("id", item.id);

      loadItems();
    }

    async function addItem() {
      const name = newItem.value.trim();
      if (!name) return;

      await supabaseClient
        .from("kitchen_items")
        .insert([{ name, status: "available" }]);

      newItem.value = "";
      newItem.focus();

      loadItems();
    }

    addBtn.addEventListener("click", addItem);

    newItem.addEventListener("keypress", (e) => {
      if (e.key === "Enter") addItem();
    });

    supabaseClient
      .channel("kitchen-board-realtime")
      .on(
        "postgres_changes",
        { event: "*", schema: "public", table: "kitchen_items" },
        () => loadItems()
      )
      .subscribe();

    loadItems();
  </script>
</body>
</html>
